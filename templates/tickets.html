<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='tickets.css') }}">
    <title>Buy Tickets | Membership Monarch</title>
</head>
<body>
    
    <section class="booking-section">
  <h2>Book an Appointment with the Celebrity </h2>

  <form action="payment.html" method="GET">
    <label>Your Full Name</label>
    <input type="text" name="fullname" placeholder="Your Name" required>

    <label>Email Address</label>
    <input type="email" name="email" placeholder="your@email.com" required>

    <label>Appointment Type</label>
    <select name="appointment_type" required>
      <option value="">-- Select Type --</option>
      <option value="Video Call">Video Call</option>
      <option value="Meet & Greet">Physical Meetup</option>
      <option value="Business Meeting">Business Meeting</option>
    </select>

    <label>Preferred Date</label>
    <input type="date" name="appointment_date" required>

    <label>Reason / Message</label>
    <textarea name="message" rows="4" placeholder="Enter some text......"></textarea>

    <button type="submit">Book & Pay</button>
  </form>
</section>


</body>
</html>
