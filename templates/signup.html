<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your account and join a private, premium dating community." />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <title>Create Account | Membership Monarch</title>
</head>

<body>

  <!-- SIGNUP PAGE WRAPPER -->
  <main class="auth-container">

    <!-- LOGO / BRAND -->
    <header class="auth-header">
      <h1 class="logo">Membership Monarch</h1>
    </header>

    <!-- SIGNUP CARD -->
    <section class="auth-card">

      <h2>Create your account</h2>
      <p class="subtitle">Private. Secure. Exclusive.</p>

      <!-- SIGNUP FORM -->
      <form action="/dashboard" method="POST">

        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Minimum 8 characters"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm password</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Re-enter your password"
            required
          />
        </div>

        <button type="submit" class="btn-primary">
          Create Account
        </button>

      </form>

      <!-- DIVIDER -->
      <div class="divider">
        <span>or</span>
      </div>

      <div class="ref">
        <p>
          Already a member?
          <a href="/login">Log in</a>
        </p>
      </div>

      <!-- LEGAL -->
      <p class="legal">
        By signing up, you agree to our
        <a href="/terms">Terms</a> 
        and
        <a href="/privacy_policy">Privacy Policy</a>.
      </p>

    </section>

    
      

  </main>

</body>
</html>
